<!DOCTYPE html>
<html lang="en">
<head>
    <meta author="Stephen Funderburk">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>GroupForge - Classroom Group Creator</title>

    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/group_forge.css">

    <!-- TODO: Replace with min verson -->
    <script src="js/group_forge.js" defer></script>
</head>
<body>
    <header>
        <button class="mobile-menu-btn" onclick="toggleMobileMenu()">☰</button>
        
        <div class="logo">GroupForge <span>Smart Grouping</span></div>

        <div class="header-actions">
            <button class="btn btn-ghost btn-sm" onclick="saveToFile()" title="Save all data to JSON file">💾 <span>Save</span></button>
            <button class="btn btn-ghost btn-sm" onclick="triggerLoadFile()" title="Load a saved JSON file">📂 <span>Load</span></button>
            <button class="btn btn-ghost btn-sm" onclick="printGroups()" title="Print current groups">🖨️ <span>Print</span></button>
            <input type="file" id="load-file-input" class="file-input-hidden" accept=".json" onchange="loadFromFile(event)">
            <input type="file" id="csv-file-input" class="file-input-hidden" accept=".csv" onchange="importCSV(event)">
        </div>
    </header>

    <div class="app-container">
        <div id="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-title">Classes</span>
                <button class="btn btn-primary btn-sm" onclick="openNewClassModal()">+ New</button>
            </div>
            
            <div id="classList"></div>
        </div>

        <main id="mainArea">
            <div id="noClassState" style="display: none;">
                <div style="font-size: 56px;">🏫</div>
                <h2>Welcome to GroupForge</h2>
                <p class="info-text">Create a class to get started, or load a previously saved file.</p>
                <div style="display: flex; gap: 8px; flex-wrap: wrap; justify-content: center">
                    <button class="btn btn-primary" onclick="openNewClassModal()">+ Create a Class</button>
                    <button class="btn btn-ghost" onclick="triggerLoadFile()">📂 Load Saved File</button>
                </div>
            </div>

            <div id="classWorkspace">
                <div id="tabMenu">
                    <button class="tab active" data-tab="students" onclick="switchTab('students', this)">👤 Students</button>
                    <button class="tab" data-tab="groups" onclick="switchTab('groups', this)">👥 Groups</button>
                    <button class="tab" data-tab="settings" onclick="switchTab('settings', this)">⚙️ Settings</button>
                    <button class="tab" data-tab="history" onclick="switchTab('history', this)">📜 History</button>
                </div>

                <div id="tabStudents" class="tab-content active">

                </div>
            </div>
        </main>
    </div>
</body>
</html>
